<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THURAYA - Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <h1>THURAYA</h1>
    <p>CLIENT TELLING & OPERATIONS</p>
</div>

<div id="loginScreen" class="container">
    <div class="card login-card">

        <h2 class="login-title">Staff Login</h2>
        <p class="login-subtitle">
            Secure access to Thuraya operations system
        </p>

        <button class="btn-google" onclick="signInWithGoogle()">
            Sign in with Google
        </button>

        <div class="login-divider">OR</div>

        <div class="login-form">
            <label>Email Address</label>
            <input type="email" id="testEmail" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" id="testPassword" placeholder="Enter your password">

            <button class="btn login-email-btn" onclick="signInWithEmail()">
                Log In
            </button>
        </div>

        <p id="errorMsg" class="error-msg"></p>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
